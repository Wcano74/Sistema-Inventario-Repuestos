# ==============================================================
# docker-compose.prod.yml — Producción (PC del cliente)
# USA imagen pre-construida desde GitHub Container Registry.
# NO necesita código fuente ni Dockerfile.
# ==============================================================
# Primer uso:
#   docker compose -f docker-compose.prod.yml up -d
#
# Actualizar (lo hace el CI/CD automáticamente):
#   docker compose -f docker-compose.prod.yml pull webapp
#   docker compose -f docker-compose.prod.yml up -d webapp
# ==============================================================

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: inventario-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=SistemaInventario77!
      - MSSQL_PID=Express
      - TZ=America/Guatemala
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
      - ./backups:/var/opt/mssql/backups
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "SistemaInventario77!" -Q "SELECT 1" -C -b
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  webapp:
    image: ghcr.io/wcano74/sistema-inventario:latest   # Imagen desde GitHub Registry
    container_name: inventario-webapp
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=SistemaInventarioDB;User Id=sa;Password=SistemaInventario77!;TrustServerCertificate=True;MultipleActiveResultSets=true;Encrypt=False
      - TZ=America/Guatemala
    ports:
      - "8080:8080"
    volumes:
      - product-images:/app/wwwroot/images/products
      - ./backups:/app/backups
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlserver-data:
    name: inventario-sqlserver-data
  product-images:
    name: inventario-product-images
