name: Deploy - Develop (Mac)

on:
  push:
    branches:
      - develop
  workflow_dispatch:

concurrency:
  group: develop
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────
  # Deploy directo en la Mac de desarrollo
  # Construye la imagen localmente (no usa ghcr.io)
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy en Mac (develop)
    runs-on: [self-hosted, inventario-dev]

    steps:
      - name: Descargar codigo fuente
        uses: actions/checkout@v4

      - name: Validar configuracion
        shell: pwsh
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH_DEV }}
        run: |
          $dp = $env:DEPLOY_PATH.Trim()
          if (-not $dp) {
            Write-Error "DEPLOY_PATH_DEV no esta configurado en GitHub Variables."
            exit 1
          }
          if (-not [System.IO.Directory]::Exists($dp)) {
            Write-Error "La ruta '$dp' no existe en este servidor."
            exit 1
          }
          Write-Host "Ruta de deploy: $dp"

      - name: Backup de base de datos pre-deploy
        shell: pwsh
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH_DEV }}
        run: |
          $dp = $env:DEPLOY_PATH.Trim()
          New-Item -ItemType Directory -Force -Path (Join-Path $dp "backups") | Out-Null

          $activo = docker ps --format "{{.Names}}" | Select-String "inventario-sqlserver"
          if (-not $activo) {
            Write-Host "SQL Server no esta corriendo, omitiendo backup."
          } else {
            $timestamp = Get-Date -Format "yyyyMMdd_HHmmss"
            $sha       = "${{ github.sha }}".Substring(0, 7)
            $archivo   = "SistemaInventarioDB_${timestamp}_dev-deploy_${sha}.bak"

            Write-Host "Creando backup: $archivo ..."
            docker exec inventario-sqlserver /opt/mssql-tools18/bin/sqlcmd `
              -S localhost -U sa -P "SistemaInventario77!" -C `
              -Q "BACKUP DATABASE [SistemaInventarioDB] TO DISK = N'/var/opt/mssql/backups/$archivo' WITH FORMAT, INIT, COMPRESSION"

            if ($LASTEXITCODE -ne 0) {
              Write-Error "Backup fallo. Abortando deploy."
              exit 1
            }
            Write-Host "Backup creado: backups/$archivo"
          }

      - name: Build y deploy local
        shell: pwsh
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH_DEV }}
        run: |
          Set-Location -LiteralPath $env:DEPLOY_PATH.Trim()
          docker compose build --no-cache webapp
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Build fallo."
            exit 1
          }
          docker compose up -d webapp
          Write-Host "Contenedor reiniciado con la imagen local"

      - name: Verificar salud del sistema
        shell: pwsh
        run: |
          Write-Host "Esperando que el sistema inicie (35s)..."
          Start-Sleep 35

          $ok = $false
          for ($i = 1; $i -le 5; $i++) {
            try {
              $r = Invoke-WebRequest -Uri "http://localhost:8080" -MaximumRedirection 5 -TimeoutSec 15 -UseBasicParsing
              Write-Host "Sistema respondiendo: HTTP $($r.StatusCode)"
              $ok = $true
              break
            } catch {
              Write-Host "Intento $i/5 fallido, reintentando en 10s..."
              Start-Sleep 10
            }
          }

          if (-not $ok) {
            docker logs inventario-webapp --tail 30
            Write-Error "El sistema no responde despues del deploy."
            exit 1
          }

      - name: Resumen del deploy
        if: always()
        shell: pwsh
        run: |
          Write-Host ""
          Write-Host "============================="
          Write-Host "  DEPLOY DEVELOP COMPLETADO"
          Write-Host "============================="
          Write-Host "  Rama:    develop"
          Write-Host "  Commit:  ${{ github.sha }}"
          Write-Host "  Autor:   ${{ github.actor }}"
          Write-Host "  Fecha:   $(Get-Date -Format 'dd/MM/yyyy HH:mm:ss')"
          Write-Host "============================="
          docker compose ps
