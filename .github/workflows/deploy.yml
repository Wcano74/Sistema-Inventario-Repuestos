name: Deploy - Sistema Inventario

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/wcano74/sistema-inventario

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Build de la imagen Docker en la nube de GitHub
  # Corre en servidores de GitHub (gratis, no usa la PC del cliente)
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build y publicar imagen
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Descargar codigo fuente
        uses: actions/checkout@v4

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y push imagen a ghcr.io
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Deploy en la PC del cliente
  # Espera a que el Job 1 termine. Solo descarga la imagen,
  # NO necesita el código fuente.
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy en produccion
    needs: build
    runs-on: [self-hosted, inventario]
    permissions:
      contents: read
      packages: read

    steps:
      - name: Validar configuracion
        shell: powershell
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        run: |
          if (-not $env:DEPLOY_PATH) {
            Write-Error "DEPLOY_PATH no esta configurado en GitHub Variables."
            exit 1
          }
          if (-not (Test-Path $env:DEPLOY_PATH)) {
            Write-Error "La ruta '$env:DEPLOY_PATH' no existe en este servidor."
            exit 1
          }
          Write-Host "Ruta de deploy: $env:DEPLOY_PATH"
          Write-Host "Imagen: ${{ env.IMAGE }}:${{ github.sha }}"

      - name: Backup de base de datos pre-deploy
        shell: powershell
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        run: |
          Set-Location $env:DEPLOY_PATH
          New-Item -ItemType Directory -Force -Path ".\backups" | Out-Null

          $activo = docker ps --format "{{.Names}}" | Select-String "inventario-sqlserver"
          if (-not $activo) {
            Write-Host "SQL Server no esta corriendo, omitiendo backup."
          } else {
            $timestamp = Get-Date -Format "yyyyMMdd_HHmmss"
            $sha       = "${{ github.sha }}".Substring(0, 7)
            $archivo   = "SistemaInventarioDB_${timestamp}_pre-deploy_${sha}.bak"

            Write-Host "Creando backup: $archivo ..."
            docker exec inventario-sqlserver /opt/mssql-tools18/bin/sqlcmd `
              -S localhost -U sa -P "SistemaInventario77!" -C `
              -Q "BACKUP DATABASE [SistemaInventarioDB] TO DISK = N'/var/opt/mssql/backups/$archivo' WITH FORMAT, INIT, COMPRESSION"

            if ($LASTEXITCODE -ne 0) {
              Write-Error "Backup fallo. Abortando deploy."
              exit 1
            }
            Write-Host "Backup creado: backups\$archivo"

            # Mantener solo los 10 backups mas recientes
            $baks = Get-ChildItem ".\backups" -Filter "*.bak" | Sort-Object LastWriteTime -Descending
            if ($baks.Count -gt 10) {
              $baks | Select-Object -Skip 10 | Remove-Item -Force
            }
          }

      - name: Login a GitHub Container Registry
        shell: powershell
        run: |
          docker login ghcr.io `
            --username "${{ github.actor }}" `
            --password "${{ secrets.GITHUB_TOKEN }}"

      - name: Descargar imagen nueva
        shell: powershell
        run: |
          docker pull ${{ env.IMAGE }}:latest
          Write-Host "Imagen descargada: ${{ env.IMAGE }}:latest"

      - name: Deploy
        shell: powershell
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        run: |
          Set-Location $env:DEPLOY_PATH
          docker compose -f docker-compose.prod.yml up -d --no-build webapp
          Write-Host "Contenedor reiniciado con la nueva imagen"

      - name: Verificar salud del sistema
        shell: powershell
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        run: |
          Set-Location $env:DEPLOY_PATH
          Write-Host "Esperando que el sistema inicie (35s)..."
          Start-Sleep 35

          docker compose -f docker-compose.prod.yml ps

          $ok = $false
          for ($i = 1; $i -le 5; $i++) {
            try {
              $r = Invoke-WebRequest -Uri "http://localhost:8080" -MaximumRedirection 5 -TimeoutSec 15 -UseBasicParsing
              Write-Host "Sistema respondiendo: HTTP $($r.StatusCode)"
              $ok = $true
              break
            } catch {
              Write-Host "Intento $i/5 fallido, reintentando en 10s..."
              Start-Sleep 10
            }
          }

          if (-not $ok) {
            docker logs inventario-webapp --tail 30
            Write-Error "El sistema no responde despues del deploy."
            exit 1
          }

      - name: Resumen del deploy
        if: always()
        shell: powershell
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        run: |
          Set-Location $env:DEPLOY_PATH
          Write-Host ""
          Write-Host "============================="
          Write-Host "  DEPLOY COMPLETADO"
          Write-Host "============================="
          Write-Host "  Imagen:  ${{ env.IMAGE }}:latest"
          Write-Host "  Commit:  ${{ github.sha }}"
          Write-Host "  Autor:   ${{ github.actor }}"
          Write-Host "  Fecha:   $(Get-Date -Format 'dd/MM/yyyy HH:mm:ss')"
          Write-Host "============================="
          docker compose -f docker-compose.prod.yml ps
