name: Deploy - Sistema Inventario

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/wcano74/sistema-inventario

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Build de la imagen Docker en la nube de GitHub
  # Corre en servidores de GitHub (gratis, no usa la PC del cliente)
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build y publicar imagen
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Descargar codigo fuente
        uses: actions/checkout@v4

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y push imagen a ghcr.io
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Deploy en la PC del cliente (Ubuntu)
  # Espera a que el Job 1 termine. Solo descarga la imagen,
  # NO necesita el código fuente.
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy en produccion
    needs: build
    runs-on: [self-hosted, inventario]
    permissions:
      contents: read
      packages: read

    steps:
      - name: Validar configuracion
        shell: bash
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        run: |
          dp=$(echo "$DEPLOY_PATH" | tr -d '\r\n' | xargs)
          if [ -z "$dp" ]; then
            echo "❌ DEPLOY_PATH no esta configurado en GitHub Variables."
            exit 1
          fi
          if [ ! -d "$dp" ]; then
            echo "❌ La ruta '$dp' no existe en este servidor."
            exit 1
          fi
          echo "✅ Ruta de deploy: $dp"
          echo "   Imagen: ${{ env.IMAGE }}:${{ github.sha }}"

      - name: Backup de base de datos pre-deploy
        shell: bash
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        run: |
          cd "$DEPLOY_PATH"
          mkdir -p backups
          ACTIVO=$(docker ps --format "{{.Names}}" | grep "inventario-sqlserver" || true)
          if [ -z "$ACTIVO" ]; then
            echo "SQL Server no esta corriendo, omitiendo backup."
          else
            TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
            SHA="${{ github.sha }}"
            SHORT_SHA="${SHA:0:7}"
            ARCHIVO="SistemaInventarioDB_${TIMESTAMP}_pre-deploy_${SHORT_SHA}.bak"
            echo "📦 Creando backup: $ARCHIVO ..."
            docker exec inventario-sqlserver /opt/mssql-tools18/bin/sqlcmd \
              -S localhost -U sa -P "SistemaInventario77!" -C \
              -Q "BACKUP DATABASE [SistemaInventarioDB] TO DISK = N'/var/opt/mssql/backups/$ARCHIVO' WITH FORMAT, INIT, COMPRESSION"
            if [ $? -ne 0 ]; then
              echo "❌ Backup fallo. Abortando deploy."
              exit 1
            fi
            echo "✅ Backup creado: backups/$ARCHIVO"
            # Mantener solo los 10 backups mas recientes
            ls -t backups/*.bak 2>/dev/null | tail -n +11 | xargs -r rm -f
          fi

      - name: Login a GitHub Container Registry
        shell: bash
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            docker login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Descargar imagen nueva
        shell: bash
        run: |
          docker pull ${{ env.IMAGE }}:latest
          echo "✅ Imagen descargada: ${{ env.IMAGE }}:latest"

      - name: Deploy
        shell: bash
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        run: |
          cd "$DEPLOY_PATH"
          docker compose -f docker-compose.prod.yml up -d --no-build webapp
          echo "✅ Contenedor reiniciado con la nueva imagen"

      - name: Verificar salud del sistema
        shell: bash
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        run: |
          cd "$DEPLOY_PATH"
          echo "⏳ Esperando que el sistema inicie (35s)..."
          sleep 35
          docker compose -f docker-compose.prod.yml ps
          OK=false
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-redirs 5 --location --max-time 15 http://localhost:8080 || echo "000")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ]; then
              echo "✅ Sistema respondiendo: HTTP $STATUS"
              OK=true
              break
            else
              echo "Intento $i/5 fallido (HTTP $STATUS), reintentando en 10s..."
              sleep 10
            fi
          done
          if [ "$OK" != "true" ]; then
            docker logs inventario-webapp --tail 30
            echo "❌ El sistema no responde despues del deploy."
            exit 1
          fi

      - name: Resumen del deploy
        if: always()
        shell: bash
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        run: |
          cd "$DEPLOY_PATH"
          echo ""
          echo "============================="
          echo "  DEPLOY COMPLETADO"
          echo "============================="
          echo "  Imagen:  ${{ env.IMAGE }}:latest"
          echo "  Commit:  ${{ github.sha }}"
          echo "  Autor:   ${{ github.actor }}"
          echo "  Fecha:   $(date '+%d/%m/%Y %H:%M:%S')"
          echo "============================="
          docker compose -f docker-compose.prod.yml ps

