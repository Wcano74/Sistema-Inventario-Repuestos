name: Deploy - Sistema Inventario

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:       # Permite disparar manualmente desde GitHub

concurrency:
  group: production
  cancel-in-progress: false  # Nunca cancelar un deploy en curso

jobs:
  deploy:
    name: Build y Deploy en Produccion
    runs-on: [self-hosted, inventario]
    timeout-minutes: 20

    steps:
      # ─────────────────────────────────────────────
      # 1. Validar configuracion
      # ─────────────────────────────────────────────
      - name: Validar configuracion
        shell: pwsh
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        run: |
          if (-not $env:DEPLOY_PATH) {
            Write-Error "DEPLOY_PATH no esta configurado. Ve a GitHub > Settings > Variables > Actions y crea la variable DEPLOY_PATH con la ruta del proyecto (ej: C:\SistemaInventario)"
            exit 1
          }
          if (-not (Test-Path $env:DEPLOY_PATH)) {
            Write-Error "La ruta '$env:DEPLOY_PATH' no existe en este servidor."
            exit 1
          }
          Write-Host "Ruta de deploy: $env:DEPLOY_PATH"
          Write-Host "Commit: $env:GITHUB_SHA"
          Write-Host "Autor: $env:GITHUB_ACTOR"
          Write-Host "Rama: $env:GITHUB_REF_NAME"

      # ─────────────────────────────────────────────
      # 2. Backup de la base de datos ANTES del deploy
      # ─────────────────────────────────────────────
      - name: Backup de base de datos pre-deploy
        shell: pwsh
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        run: |
          Set-Location $env:DEPLOY_PATH
          New-Item -ItemType Directory -Force -Path ".\backups" | Out-Null

          $contenedorActivo = docker ps --format "{{.Names}}" | Select-String "inventario-sqlserver"
          if (-not $contenedorActivo) {
            Write-Host "SQL Server no esta corriendo, omitiendo backup..."
          } else {
            $timestamp = Get-Date -Format "yyyyMMdd_HHmmss"
            $shortSha  = "$env:GITHUB_SHA".Substring(0, 7)
            $archivo   = "SistemaInventarioDB_${timestamp}_pre-deploy_${shortSha}.bak"

            Write-Host "Creando backup: $archivo ..."

            docker exec inventario-sqlserver /opt/mssql-tools18/bin/sqlcmd `
              -S localhost -U sa -P "SistemaInventario77!" -C `
              -Q "BACKUP DATABASE [SistemaInventarioDB] TO DISK = N'/var/opt/mssql/backups/$archivo' WITH FORMAT, INIT, COMPRESSION, NAME = N'PreDeploy-$timestamp'"

            if ($LASTEXITCODE -ne 0) {
              Write-Error "El backup fallo. Abortando deploy para proteger los datos."
              exit 1
            }

            Write-Host "Backup creado: backups\$archivo"

            # Mantener solo los 10 backups mas recientes
            $baks = Get-ChildItem -Path ".\backups" -Filter "*.bak" | Sort-Object LastWriteTime -Descending
            if ($baks.Count -gt 10) {
              $baks | Select-Object -Skip 10 | Remove-Item -Force
              Write-Host "Limpieza: se mantienen los 10 backups mas recientes"
            }
          }

      # ─────────────────────────────────────────────
      # 3. Actualizar codigo desde GitHub
      # ─────────────────────────────────────────────
      - name: Actualizar codigo
        shell: pwsh
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        run: |
          Set-Location $env:DEPLOY_PATH

          $rama = "$env:GITHUB_REF_NAME"
          Write-Host "Descargando cambios de rama: $rama ..."
          git fetch origin

          # Reset hard para asegurar estado limpio (descarta cambios locales)
          git reset --hard "origin/$rama"

          $commitCorto  = git rev-parse --short HEAD
          $commitMensaje = git log -1 --pretty=%s
          Write-Host "Codigo actualizado al commit $commitCorto : $commitMensaje"

      # ─────────────────────────────────────────────
      # 4. Build de la nueva imagen Docker
      # ─────────────────────────────────────────────
      - name: Build Docker
        shell: pwsh
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        run: |
          Set-Location $env:DEPLOY_PATH

          Write-Host "Construyendo imagen de la aplicacion..."
          docker compose build --no-cache webapp

          if ($LASTEXITCODE -ne 0) {
            Write-Error "El build de Docker fallo."
            exit 1
          }
          Write-Host "Build completado"

      # ─────────────────────────────────────────────
      # 5. Deploy: solo reinicia la webapp (no toca SQL Server)
      # ─────────────────────────────────────────────
      - name: Deploy
        shell: pwsh
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        run: |
          Set-Location $env:DEPLOY_PATH

          Write-Host "Reiniciando aplicacion web..."
          docker compose up -d --force-recreate --no-deps webapp

          if ($LASTEXITCODE -ne 0) {
            Write-Error "El deploy fallo."
            exit 1
          }
          Write-Host "Contenedor reiniciado"

      # ─────────────────────────────────────────────
      # 6. Esperar inicio y verificar salud
      # ─────────────────────────────────────────────
      - name: Verificar salud del sistema
        shell: pwsh
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        run: |
          Set-Location $env:DEPLOY_PATH

          Write-Host "Esperando que el sistema inicie (35s)..."
          Start-Sleep 35

          # Estado de contenedores
          Write-Host ""
          Write-Host "Estado de contenedores:"
          docker compose ps

          # Verificar que responde HTTP
          Write-Host ""
          Write-Host "Verificando respuesta HTTP en localhost:8080 ..."
          $intentos = 0
          $maxIntentos = 5
          $ok = $false

          while ($intentos -lt $maxIntentos -and -not $ok) {
            try {
              $r = Invoke-WebRequest -Uri "http://localhost:8080" -MaximumRedirection 5 -TimeoutSec 15 -UseBasicParsing
              Write-Host "Sistema respondiendo: HTTP $($r.StatusCode)"
              $ok = $true
            } catch {
              $intentos++
              Write-Host "Intento $intentos/$maxIntentos fallido, reintentando en 10s..."
              Start-Sleep 10
            }
          }

          if (-not $ok) {
            Write-Host ""
            Write-Host "--- Ultimos logs del contenedor ---"
            docker logs inventario-webapp --tail 50
            Write-Error "El sistema no responde despues del deploy."
            exit 1
          }

      # ─────────────────────────────────────────────
      # 7. Resumen final (siempre se ejecuta)
      # ─────────────────────────────────────────────
      - name: Resumen del deploy
        if: always()
        shell: pwsh
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        run: |
          Set-Location $env:DEPLOY_PATH
          $commit  = git rev-parse --short HEAD
          $mensaje = git log -1 --pretty=%s
          $fecha   = Get-Date -Format "dd/MM/yyyy HH:mm:ss"
          Write-Host ""
          Write-Host "============================="
          Write-Host "  DEPLOY COMPLETADO"
          Write-Host "============================="
          Write-Host "  Fecha:   $fecha"
          Write-Host "  Commit:  $commit"
          Write-Host "  Cambio:  $mensaje"
          Write-Host "  Autor:   $env:GITHUB_ACTOR"
          Write-Host "============================="
          docker compose ps
